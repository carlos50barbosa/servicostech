# Fail2Ban filter — scanners/bots (404 em caminhos tipicamente maliciosos)
# O site não serve .php/.env/wp-* etc; um 404 nesses paths é varredura automatizada.
[Definition]
failregex = access route="[^"]*" path="[^"]*(?:wp-login|wp-admin|wp-includes|wp-content|xmlrpc\.php|\.env|\.git|\.aws|\.ssh|id_rsa|phpmyadmin|/pma|myadmin|adminer|/vendor/|/cgi-bin/|eval-stdin|/boaform|/owa/|/shell|/actuator|/solr|/console|/telescope|\.php|\.asp|\.aspx|\.jsp)[^"]*" status=404 ms=[0-9.]+ ip="<HOST>"
ignoreregex =
