# Fail2Ban filter — força-bruta no painel (status 401 em caminhos /admin*)
# Casa linhas do log do server.js, ex.:
#   [2026-...Z] WARN access route="blog" path="/admin5468" status=401 ms=0.5 ip="1.2.3.4" from="" ua="..."
[Definition]
failregex = access route="[^"]*" path="[^"]*admin[^"]*" status=401 ms=[0-9.]+ ip="<HOST>"
ignoreregex =
