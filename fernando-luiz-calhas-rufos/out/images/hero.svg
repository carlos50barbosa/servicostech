<!-- IMAGEM PLACEHOLDER DO HERO — ilustração de calha em telhado.
     TROCAR: substitua por foto real do cliente (sugestão: 1200x900, proporção 4:3, .webp/.jpg). -->
<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustração de calha instalada na borda de um telhado">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13294B"/>
      <stop offset="1" stop-color="#0B1E3F"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A2332"/>
      <stop offset="1" stop-color="#0B1E3F"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#C9D1D9"/>
    </linearGradient>
  </defs>

  <!-- céu -->
  <rect width="1200" height="900" fill="url(#sky)"/>

  <!-- sol / brilho dourado -->
  <circle cx="980" cy="180" r="120" fill="#F2A900" opacity="0.16"/>
  <circle cx="980" cy="180" r="70" fill="#F2A900" opacity="0.22"/>

  <!-- nuvens sutis -->
  <g fill="#C9D1D9" opacity="0.12">
    <ellipse cx="280" cy="170" rx="120" ry="34"/>
    <ellipse cx="380" cy="150" rx="90" ry="28"/>
    <ellipse cx="760" cy="120" rx="100" ry="26"/>
  </g>

  <!-- telhado (água de telhado em diagonal) -->
  <path d="M120 560 L760 230 L1180 440 L1180 620 L120 760 Z" fill="url(#roof)"/>
  <!-- linhas de telhas -->
  <g stroke="#13294B" stroke-width="3" opacity="0.7">
    <path d="M200 600 L820 290"/>
    <path d="M300 640 L900 330"/>
    <path d="M420 690 L1000 380"/>
  </g>

  <!-- calha metálica (meia-cana) na borda do telhado -->
  <g>
    <path d="M110 560 L770 222" stroke="url(#metal)" stroke-width="26" stroke-linecap="round"/>
    <path d="M110 560 L770 222" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- condutor / tubo de descida -->
    <rect x="150" y="555" width="34" height="250" rx="12" fill="url(#metal)"/>
    <rect x="150" y="555" width="10" height="250" rx="5" fill="#94A3B8" opacity="0.4"/>
  </g>

  <!-- gotas de água caindo na calha (dourado de destaque) -->
  <g fill="#F2A900">
    <path d="M520 360 C520 360 530 374 530 382 C530 388 525 392 520 392 C515 392 510 388 510 382 C510 374 520 360 520 360 Z"/>
    <path d="M610 320 C610 320 619 332 619 339 C619 344 615 348 610 348 C605 348 601 344 601 339 C601 332 610 320 610 320 Z" opacity="0.85"/>
    <path d="M430 410 C430 410 438 421 438 427 C438 432 434 435 430 435 C426 435 422 432 422 427 C422 421 430 410 430 410 Z" opacity="0.7"/>
  </g>

  <!-- chão / casa abaixo -->
  <rect x="0" y="780" width="1200" height="120" fill="#13294B"/>
  <rect x="0" y="780" width="1200" height="6" fill="#F2A900" opacity="0.5"/>

  <!-- selo de marca -->
  <text x="600" y="850" text-anchor="middle" font-family="'Montserrat','Segoe UI',sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#C9D1D9" opacity="0.6">CALHAS E RUFOS</text>
</svg>
