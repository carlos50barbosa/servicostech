<!-- IMAGEM DE CAPA (Open Graph / compartilhamento em redes sociais) — 1200x630.
     TROCAR: opcionalmente substitua por uma capa com foto real do cliente. -->
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fernando Luiz — Calhas e Rufos em Campinas e região">
  <defs>
    <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1E3F"/>
      <stop offset="1" stop-color="#13294B"/>
    </linearGradient>
    <linearGradient id="ogmetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#C9D1D9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og)"/>

  <!-- faixa dourada de marca -->
  <rect x="0" y="0" width="14" height="630" fill="#F2A900"/>

  <!-- brilho -->
  <circle cx="1050" cy="120" r="180" fill="#F2A900" opacity="0.12"/>

  <!-- ícone calha + gota -->
  <g transform="translate(900 250)">
    <rect x="-20" y="-30" width="240" height="240" rx="46" fill="#0B1E3F" stroke="#F2A900" stroke-opacity="0.4" stroke-width="3"/>
    <path d="M30 40 H170 V60 C170 110 138 140 100 140 C62 140 30 110 30 60 Z" fill="none" stroke="url(#ogmetal)" stroke-width="12" stroke-linejoin="round"/>
    <path d="M24 40 H176" stroke="url(#ogmetal)" stroke-width="12" stroke-linecap="round"/>
    <path d="M100 62 C100 62 132 102 132 124 C132 142 118 156 100 156 C82 156 68 142 68 124 C68 102 100 62 100 62 Z" fill="#F2A900"/>
  </g>

  <!-- textos -->
  <text x="90" y="190" font-family="'Montserrat','Segoe UI',sans-serif" font-size="30" font-weight="700" letter-spacing="8" fill="#F2A900">FERNANDO LUIZ</text>
  <text x="90" y="300" font-family="'Montserrat','Segoe UI',sans-serif" font-size="72" font-weight="800" fill="#F8FAFC">Calhas e Rufos</text>
  <text x="90" y="380" font-family="'Inter','Segoe UI',sans-serif" font-size="34" font-weight="600" fill="#C9D1D9">Qualidade que protege, serviço que dura.</text>
  <text x="90" y="470" font-family="'Inter','Segoe UI',sans-serif" font-size="28" font-weight="500" fill="#C9D1D9" opacity="0.85">Instalação · Limpeza · Manutenção · Impermeabilização</text>

  <!-- rodapé com contato -->
  <rect x="90" y="520" width="520" height="60" rx="30" fill="#F2A900"/>
  <text x="350" y="559" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#0B1E3F">Campinas e região · (19) 99806-8683</text>
</svg>
