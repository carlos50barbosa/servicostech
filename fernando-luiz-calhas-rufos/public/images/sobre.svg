<!-- IMAGEM PLACEHOLDER — seção "Sobre".
     TROCAR: foto real do profissional/equipe em ação (sugestão: 900x1000, proporção 9:10). -->
<svg width="900" height="1000" viewBox="0 0 900 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profissional de calhas e rufos em atendimento">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1E3F"/>
      <stop offset="1" stop-color="#13294B"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1000" rx="24" fill="url(#bg3)"/>

  <!-- moldura dourada -->
  <rect x="40" y="40" width="820" height="920" rx="18" fill="none" stroke="#F2A900" stroke-opacity="0.4" stroke-width="3"/>

  <!-- silhueta de profissional -->
  <g transform="translate(450 470)">
    <!-- capacete -->
    <path d="M-70 -110 A70 70 0 0 1 70 -110 L70 -96 L-70 -96 Z" fill="#F2A900"/>
    <rect x="-78" y="-100" width="156" height="14" rx="7" fill="#D8920A"/>
    <!-- cabeça -->
    <circle cx="0" cy="-50" r="46" fill="#C9D1D9"/>
    <!-- corpo / uniforme -->
    <path d="M-90 200 C-90 70 -60 0 0 0 C60 0 90 70 90 200 Z" fill="#C9D1D9"/>
    <path d="M0 0 L0 200" stroke="#0B1E3F" stroke-width="4" opacity="0.3"/>
    <!-- faixa dourada no uniforme -->
    <path d="M-80 120 L80 120" stroke="#F2A900" stroke-width="10"/>
  </g>

  <!-- ferramenta / nível -->
  <rect x="600" y="560" width="180" height="34" rx="8" fill="#F2A900" transform="rotate(28 690 577)"/>

  <text x="450" y="900" text-anchor="middle" font-family="'Montserrat','Segoe UI',sans-serif" font-size="26" font-weight="800" letter-spacing="2" fill="#F8FAFC">FERNANDO LUIZ</text>
  <text x="450" y="938" text-anchor="middle" font-family="'Montserrat','Segoe UI',sans-serif" font-size="16" font-weight="600" letter-spacing="5" fill="#F2A900">CALHAS E RUFOS</text>
</svg>
