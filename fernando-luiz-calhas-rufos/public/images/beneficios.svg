<!-- IMAGEM PLACEHOLDER — seção "Por que cuidar das suas calhas?".
     TROCAR: foto real (sugestão: 1000x800, proporção 5:4). -->
<svg width="1000" height="800" viewBox="0 0 1000 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Casa protegida por sistema de calhas em dia de chuva">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13294B"/>
      <stop offset="1" stop-color="#0B1E3F"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#C9D1D9"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="800" rx="24" fill="url(#bg2)"/>

  <!-- chuva -->
  <g stroke="#C9D1D9" stroke-width="3" opacity="0.18" stroke-linecap="round">
    <path d="M140 120 L120 200"/>
    <path d="M240 80 L220 160"/>
    <path d="M360 130 L340 210"/>
    <path d="M700 90 L680 170"/>
    <path d="M820 140 L800 220"/>
    <path d="M900 80 L880 160"/>
  </g>

  <!-- casa -->
  <path d="M250 340 L500 200 L750 340 Z" fill="#1A2332"/>
  <rect x="300" y="340" width="400" height="260" fill="#13294B"/>
  <rect x="300" y="340" width="400" height="260" stroke="#C9D1D9" stroke-opacity="0.25" stroke-width="3"/>
  <!-- porta -->
  <rect x="455" y="470" width="90" height="130" rx="6" fill="#0B1E3F" stroke="#F2A900" stroke-width="3"/>
  <!-- janelas -->
  <rect x="340" y="400" width="80" height="70" rx="6" fill="#0B1E3F" stroke="#C9D1D9" stroke-opacity="0.5" stroke-width="2"/>
  <rect x="580" y="400" width="80" height="70" rx="6" fill="#0B1E3F" stroke="#C9D1D9" stroke-opacity="0.5" stroke-width="2"/>

  <!-- calha dourada protegendo a borda do telhado -->
  <path d="M240 348 L760 348" stroke="#F2A900" stroke-width="14" stroke-linecap="round"/>
  <rect x="690" y="348" width="22" height="250" rx="10" fill="url(#metal2)"/>

  <!-- escudo de proteção -->
  <g transform="translate(500 660)">
    <path d="M0 -40 L42 -24 V6 C42 36 22 54 0 64 C-22 54 -42 36 -42 6 V-24 Z" fill="#F2A900"/>
    <path d="M-16 4 L-4 18 L20 -12" stroke="#0B1E3F" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <text x="500" y="760" text-anchor="middle" font-family="'Montserrat','Segoe UI',sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#C9D1D9" opacity="0.55">PATRIMÔNIO PROTEGIDO</text>
</svg>
