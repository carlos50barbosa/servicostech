<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E0F4F"/>
      <stop offset="50%" stop-color="#1A1140"/>
      <stop offset="100%" stop-color="#0A0E27"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2B544"/>
      <stop offset="100%" stop-color="#E0A02E"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#E0A02E" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#E0A02E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(80,72)">
    <rect width="88" height="88" rx="24" fill="url(#gold)" opacity="0.12"/>
    <rect width="88" height="88" rx="24" fill="#4B1E78"/>
    <text x="44" y="58" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="800" letter-spacing="-2">
      <tspan fill="#FFFFFF">R</tspan><tspan fill="url(#gold)">S</tspan>
    </text>
    <text x="108" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">Rodolfo Souza</text>
    <text x="108" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="4" fill="#F2B544">CRÉDITO</text>
  </g>

  <!-- Headline -->
  <text x="80" y="300" font-family="'Segoe UI', system-ui, sans-serif" font-size="62" font-weight="800" fill="#FFFFFF">Crédito facilitado com as</text>
  <text x="80" y="372" font-family="'Segoe UI', system-ui, sans-serif" font-size="62" font-weight="800" fill="url(#gold)">melhores taxas do mercado</text>

  <!-- Subtitle -->
  <text x="80" y="438" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="500" fill="#FFFFFF" opacity="0.78">Transforme o limite do seu cartão em dinheiro via PIX.</text>

  <!-- Badges -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="600">
    <g transform="translate(80,500)">
      <rect width="290" height="52" rx="26" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="34" cy="26" r="6" fill="#1FB573"/>
      <text x="56" y="33" fill="#FFFFFF">Sem consulta SPC/Serasa</text>
    </g>
    <g transform="translate(390,500)">
      <rect width="220" height="52" rx="26" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="34" cy="26" r="6" fill="#1FB573"/>
      <text x="56" y="33" fill="#FFFFFF">Liberação via PIX</text>
    </g>
    <g transform="translate(630,500)">
      <rect width="200" height="52" rx="26" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="34" cy="26" r="6" fill="#1FB573"/>
      <text x="56" y="33" fill="#FFFFFF">Em até 18x</text>
    </g>
  </g>

  <!-- Stylized card -->
  <g transform="translate(835,150) rotate(8)">
    <rect width="300" height="190" rx="22" fill="#4B1E78" stroke="#7B3FB8" stroke-width="1"/>
    <rect x="28" y="86" width="48" height="36" rx="6" fill="url(#gold)"/>
    <text x="28" y="155" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" letter-spacing="3" fill="#FFFFFF" opacity="0.9">•••• •••• 8912</text>
    <text x="200" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#F2B544">CRÉDITO</text>
  </g>
</svg>
