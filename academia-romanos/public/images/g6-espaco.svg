<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Nosso Espaço — foto ilustrativa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1b20"/>
      <stop offset="1" stop-color="#0f0f12"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect x="3" y="3" width="794" height="594" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <rect x="0" y="0" width="6" height="600" fill="#E10600"/>

  <!-- tag superior -->
  <text x="34" y="56" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#B3B3B3" letter-spacing="3">FOTO ILUSTRATIVA</text>

  <!-- icone de imagem -->
  <g transform="translate(315 173)">
    <rect x="0" y="0" width="170" height="134" rx="14" fill="none" stroke="#3a3a42" stroke-width="5"/>
    <circle cx="46" cy="44" r="15" fill="#E10600"/>
    <path d="M12 124 L64 62 L98 100 L122 74 L158 124 Z" fill="#33333b"/>
  </g>

  <!-- rotulo + dimensoes -->
  <text x="400" y="365" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">NOSSO ESPAÇO</text>
  <text x="400" y="399" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6b6b72" text-anchor="middle">800 × 600  ·  substituir pela foto real</text>
</svg>