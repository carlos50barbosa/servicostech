<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Academia Romanos">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#E10600" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#E10600" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="10" height="630" fill="#E10600"/>

  <!-- Emblema -->
  <g transform="translate(90 96)">
    <path d="M40 0 L31 14 L49 14 Z" fill="#E10600"/>
    <rect x="10" y="14" width="60" height="60" rx="12" fill="#E10600"/>
    <text x="40" y="60" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">R</text>
  </g>

  <text x="90" y="300" font-family="Arial Black, Arial, sans-serif" font-size="120" font-weight="900" fill="#FFFFFF" letter-spacing="-2">ROMANOS</text>
  <text x="96" y="356" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#E10600" letter-spacing="3">ACADEMIA · CARAPICUÍBA · 20 ANOS</text>

  <text x="92" y="452" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF">Começar é o remédio que faltava.</text>
  <text x="92" y="506" font-family="Arial, sans-serif" font-size="26" fill="#B3B3B3">Musculação · Funcional · Pilates · Jiu-Jitsu — COHAB 2 e COHAB 5</text>
</svg>
